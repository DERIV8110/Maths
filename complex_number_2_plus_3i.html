
<div style="padding: 1rem 0;">
  <div style="position: relative; width: 100%; height: 360px;">
    <canvas id="cPlane" role="img" aria-label="Complex plane showing point 2 + 3i plotted at real=2, imaginary=3">Complex number 2 + 3i at coordinates (2, 3).</canvas>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
const gridColor = isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.08)';
const axisColor = isDark ? 'rgba(255,255,255,0.3)' : 'rgba(0,0,0,0.25)';
const textColor = isDark ? '#ccc' : '#555';

new Chart(document.getElementById('cPlane'), {
  type: 'scatter',
  data: {
    datasets: [
      {
        label: '2 + 3i',
        data: [{ x: 2, y: 3 }],
        backgroundColor: '#534AB7',
        borderColor: '#534AB7',
        pointRadius: 8,
        pointHoverRadius: 10
      },
      {
        label: 'Real axis projection',
        data: [{ x: 0, y: 0 }, { x: 2, y: 0 }],
        type: 'line',
        borderColor: '#1D9E75',
        borderWidth: 1.5,
        borderDash: [5, 4],
        pointRadius: 0,
        tension: 0
      },
      {
        label: 'Imaginary axis projection',
        data: [{ x: 2, y: 0 }, { x: 2, y: 3 }],
        type: 'line',
        borderColor: '#D85A30',
        borderWidth: 1.5,
        borderDash: [5, 4],
        pointRadius: 0,
        tension: 0
      },
      {
        label: 'Modulus |z| = √13',
        data: [{ x: 0, y: 0 }, { x: 2, y: 3 }],
        type: 'line',
        borderColor: '#888780',
        borderWidth: 1.5,
        pointRadius: 0,
        tension: 0
      }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    animation: false,
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          label: (ctx) => {
            if (ctx.datasetIndex === 0) return ' z = 2 + 3i';
            return null;
          }
        },
        filter: (item) => item.datasetIndex === 0
      },
      afterDraw: undefined
    },
    scales: {
      x: {
        type: 'linear',
        min: -1,
        max: 4,
        title: { display: true, text: 'Real axis', color: textColor, font: { size: 13 } },
        grid: { color: gridColor },
        border: { color: axisColor },
        ticks: { color: textColor, stepSize: 1 }
      },
      y: {
        type: 'linear',
        min: -1,
        max: 5,
        title: { display: true, text: 'Imaginary axis', color: textColor, font: { size: 13 } },
        grid: { color: gridColor },
        border: { color: axisColor },
        ticks: { color: textColor, stepSize: 1, callback: (v) => v + 'i' }
      }
    }
  },
  plugins: [{
    id: 'annotations',
    afterDraw(chart) {
      const ctx = chart.ctx;
      const xScale = chart.scales.x;
      const yScale = chart.scales.y;
      const px = xScale.getPixelForValue(2);
      const py = yScale.getPixelForValue(3);
      ctx.save();
      ctx.fillStyle = isDark ? '#ccc' : '#333';
      ctx.font = '500 14px sans-serif';
      ctx.fillText('2 + 3i', px + 10, py - 10);
      ctx.font = '12px sans-serif';
      ctx.fillStyle = '#1D9E75';
      ctx.fillText('Re = 2', xScale.getPixelForValue(1), yScale.getPixelForValue(0) - 8);
      ctx.fillStyle = '#D85A30';
      ctx.fillText('Im = 3', px + 6, yScale.getPixelForValue(1.5));
      ctx.fillStyle = isDark ? '#aaa' : '#888';
      ctx.fillText('|z| = √13 ≈ 3.61', xScale.getPixelForValue(0.3), yScale.getPixelForValue(1.7));
      ctx.restore();
    }
  }]
});
</script>
