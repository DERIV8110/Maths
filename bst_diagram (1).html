<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Binary Search Tree</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #070e17;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    padding: 32px 16px;
  }
  h1 { color: #4fc3f7; font-size: 26px; letter-spacing: 0.05em; margin-bottom: 6px; }
  .subtitle { color: #546e7a; font-size: 12px; margin-bottom: 24px; }
  .label { color: #546e7a; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 6px; }
  .card {
    background: #0a1929;
    border-radius: 16px;
    border: 1px solid #1e4976;
    padding: 32px 40px;
    box-shadow: 0 8px 48px rgba(0,0,0,0.5);
    overflow-x: auto;
  }
  svg { display: block; }
  .legend { margin-top: 20px; display: flex; gap: 20px; font-size: 11px; color: #546e7a; }
  .legend span { display: flex; align-items: center; gap: 5px; }
  .dot { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }
</style>
</head>
<body>

<div class="label">Data Structure</div>
<h1>Binary Search Tree</h1>
<p class="subtitle">Each node: value · left pointer · right pointer &nbsp;·&nbsp; Click a node to highlight</p>

<div class="card">
  <svg id="tree" width="640" height="380"></svg>
</div>

<div class="legend">
  <span><span class="dot" style="background:#ef5350"></span> Column header</span>
  <span><span class="dot" style="background:#90caf9"></span> Node value</span>
  <span><span class="dot" style="background:#a5d6a7"></span> Pointer to child</span>
  <span><span class="dot" style="background:#546e7a"></span> None (null)</span>
</div>

<script>
const NW = 160, NH = 56;

const tree = {
  value: 5, x: 240, y: 20,
  left:  { value: 2, x: 80,  y: 160,
    left:  { value: 1, x: 0,   y: 300, left: null, right: null },
    right: { value: 4, x: 160, y: 300, left: null, right: null }
  },
  right: { value: 8, x: 400, y: 160, left: null,
    right: { value: 9, x: 440, y: 300, left: null, right: null }
  }
};

const svg = document.getElementById('tree');
const ns = 'http://www.w3.org/2000/svg';
let highlighted = null;

function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

// Arrow marker
const defs = el('defs', {});
const marker = el('marker', { id: 'arr', markerWidth: '8', markerHeight: '6', refX: '7', refY: '3', orient: 'auto' });
const poly = el('polygon', { points: '0 0, 8 3, 0 6', fill: '#4fc3f7', opacity: '0.7' });
marker.appendChild(poly);
defs.appendChild(marker);
svg.appendChild(defs);

function allNodes(node, list = []) {
  if (!node) return list;
  list.push(node);
  allNodes(node.left, list);
  allNodes(node.right, list);
  return list;
}

function drawEdge(from, to, side) {
  const fx = from.x + (side === 'left' ? NW / 3 : (NW * 2) / 3);
  const fy = from.y + NH;
  const tx = to.x + NW / 2;
  const ty = to.y;
  const my = (fy + ty) / 2;
  const path = el('path', {
    d: `M${fx},${fy} C${fx},${my} ${tx},${my} ${tx},${ty}`,
    fill: 'none', stroke: '#1e4976', 'stroke-width': '1.5',
    'stroke-dasharray': '4 2', 'marker-end': 'url(#arr)',
    class: `edge edge-${from.value} edge-${to.value}`
  });
  svg.appendChild(path);
}

function drawEdges(node) {
  if (!node) return;
  if (node.left)  { drawEdge(node, node.left,  'left');  drawEdges(node.left); }
  if (node.right) { drawEdge(node, node.right, 'right'); drawEdges(node.right); }
}

function drawNode(node) {
  const g = el('g', { transform: `translate(${node.x},${node.y})`, style: 'cursor:pointer', class: `node node-${node.value}` });

  // shadow
  const shadow = el('rect', { x: 3, y: 3, width: NW, height: NH, rx: 6, fill: 'rgba(0,0,0,0.2)' });
  // bg
  const bg = el('rect', { x: 0, y: 0, width: NW, height: NH, rx: 6, fill: '#0f2339', stroke: '#1e4976', 'stroke-width': '1.5', class: `bg-${node.value}` });
  // dividers
  const d1 = el('line', { x1: NW/3, y1: 0, x2: NW/3, y2: NH, stroke: '#1e4976', 'stroke-width': '1' });
  const d2 = el('line', { x1: NW*2/3, y1: 0, x2: NW*2/3, y2: NH, stroke: '#1e4976', 'stroke-width': '1' });

  function txt(x, y, content, fill, size) {
    const t = el('text', { x, y, 'text-anchor': 'middle', fill, 'font-size': size, 'font-family': "'Courier New', monospace", 'font-weight': 'bold' });
    t.textContent = content;
    return t;
  }

  g.appendChild(shadow);
  g.appendChild(bg);
  g.appendChild(d1);
  g.appendChild(d2);
  g.appendChild(txt(NW/6, 14, 'value', '#ef5350', 9));
  g.appendChild(txt(NW/2, 14, 'left',  '#ef5350', 9));
  g.appendChild(txt(NW*5/6, 14, 'right', '#ef5350', 9));
  g.appendChild(txt(NW/6, 38, node.value, '#90caf9', 16));
  g.appendChild(txt(NW/2, 38, node.left  ? `→${node.left.value}`  : 'None', node.left  ? '#a5d6a7' : '#546e7a', 11));
  g.appendChild(txt(NW*5/6, 38, node.right ? `→${node.right.value}` : 'None', node.right ? '#a5d6a7' : '#546e7a', 11));

  g.addEventListener('click', () => {
    const same = highlighted === node.value;
    highlighted = same ? null : node.value;
    updateHighlight();
  });

  svg.appendChild(g);
}

function updateHighlight() {
  allNodes(tree).forEach(n => {
    const bg = svg.querySelector(`.bg-${n.value}`);
    const isH = highlighted === n.value;
    if (bg) {
      bg.setAttribute('fill', isH ? '#1a3a5c' : '#0f2339');
      bg.setAttribute('stroke', isH ? '#4fc3f7' : '#1e4976');
      bg.setAttribute('stroke-width', isH ? '2' : '1.5');
    }
  });
  svg.querySelectorAll('path[class^="edge"]').forEach(p => {
    const cls = p.getAttribute('class');
    const active = highlighted && cls.includes(`edge-${highlighted}`);
    p.setAttribute('stroke', active ? '#4fc3f7' : '#1e4976');
    p.setAttribute('stroke-width', active ? '2' : '1.5');
    p.setAttribute('stroke-dasharray', active ? 'none' : '4 2');
    p.setAttribute('opacity', active ? '1' : '0.7');
  });
}

drawEdges(tree);
allNodes(tree).forEach(drawNode);
</script>
</body>
</html>
