<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pascal's Triangle (n=0 to n=9)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #0f0f1a;
    color: #e0e0f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
  }
  h1 {
    font-size: 28px;
    font-weight: 600;
    margin-bottom: 6px;
    color: #c9b8ff;
    letter-spacing: 0.5px;
  }
  .subtitle {
    font-size: 14px;
    color: #888;
    margin-bottom: 40px;
  }
  .triangle {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .row {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .row-label {
    width: 48px;
    text-align: right;
    font-size: 12px;
    color: #555;
    padding-right: 10px;
    flex-shrink: 0;
  }
  .cell {
    width: 60px;
    height: 48px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    font-weight: 500;
    transition: transform 0.15s, box-shadow 0.15s;
    cursor: default;
    position: relative;
  }
  .cell:hover {
    transform: scale(1.12);
    z-index: 10;
  }
  /* Edge cells (value = 1) */
  .cell.edge {
    background: #1e1e2e;
    border: 1px solid #3a3a5c;
    color: #888;
  }
  /* Small inner values (2–9) */
  .cell.small {
    background: #0d3d3a;
    border: 1px solid #0f6e56;
    color: #5dcaa5;
  }
  /* Medium values (10–99) */
  .cell.medium {
    background: #1a1040;
    border: 1px solid #534ab7;
    color: #afa9ec;
  }
  /* Large values (100+) */
  .cell.large {
    background: #2a0a30;
    border: 1px solid #993356;
    color: #f4c0d1;
    font-size: 13px;
  }
  .legend {
    display: flex;
    gap: 20px;
    margin-top: 36px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: #aaa;
  }
  .legend-box {
    width: 20px;
    height: 20px;
    border-radius: 5px;
  }
  .formula {
    margin-top: 32px;
    background: #1a1a2e;
    border: 1px solid #333;
    border-radius: 12px;
    padding: 16px 28px;
    font-size: 14px;
    color: #aaa;
    text-align: center;
    line-height: 1.8;
  }
  .formula span { color: #c9b8ff; font-weight: 500; }
</style>
</head>
<body>

<h1>Pascal's Triangle</h1>
<p class="subtitle">Rows n = 0 through n = 9 &nbsp;·&nbsp; Each cell = C(n, k) = n! / (k!(n−k)!)</p>

<div class="triangle" id="triangle"></div>

<div class="legend">
  <div class="legend-item"><div class="legend-box" style="background:#1e1e2e;border:1px solid #3a3a5c"></div> Edge (= 1)</div>
  <div class="legend-item"><div class="legend-box" style="background:#0d3d3a;border:1px solid #0f6e56"></div> Small (2–9)</div>
  <div class="legend-item"><div class="legend-box" style="background:#1a1040;border:1px solid #534ab7"></div> Medium (10–99)</div>
  <div class="legend-item"><div class="legend-box" style="background:#2a0a30;border:1px solid #993356"></div> Large (100+)</div>
</div>

<div class="formula">
  <span>(a + 1)ⁿ</span> = Σ C(n, k) · aᵏ &nbsp;|&nbsp;
  Pascal's rule: <span>C(n,k) = C(n−1,k−1) + C(n−1,k)</span>
</div>

<script>
  function getClass(val, k, n) {
    if (k === 0 || k === n) return 'edge';
    if (val < 10) return 'small';
    if (val < 100) return 'medium';
    return 'large';
  }

  const container = document.getElementById('triangle');

  for (let n = 0; n <= 9; n++) {
    const rowDiv = document.createElement('div');
    rowDiv.className = 'row';

    const label = document.createElement('div');
    label.className = 'row-label';
    label.textContent = 'n=' + n;
    rowDiv.appendChild(label);

    for (let k = 0; k <= n; k++) {
      let val = 1;
      for (let i = 0; i < k; i++) val = Math.round(val * (n - i) / (i + 1));

      const cell = document.createElement('div');
      cell.className = 'cell ' + getClass(val, k, n);
      cell.textContent = val;
      cell.title = `C(${n},${k}) = ${val}`;
      rowDiv.appendChild(cell);
    }

    container.appendChild(rowDiv);
  }
</script>

</body>
</html>
